name: build_windows_example

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows support
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        working-directory: packages/device_info_plus/device_info_plus/example
        run: flutter pub get

      - name: Build Windows app
        working-directory: packages/device_info_plus/device_info_plus/example
        run: flutter build windows

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: packages/device_info_plus/device_info_plus/example/build/windows/x64/runner/Release/
